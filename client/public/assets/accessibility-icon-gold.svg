<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gold circle background -->
  <circle cx="50" cy="50" r="48" fill="#F0C040" stroke="#C8960A" stroke-width="2"/>
  <!-- Accessibility person figure in black outline -->
  <!-- Head -->
  <circle cx="50" cy="22" r="7" fill="none" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="50" y1="29" x2="50" y2="58" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Arms outstretched -->
  <line x1="22" y1="40" x2="78" y2="40" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="50" y1="58" x2="30" y2="80" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="50" y1="58" x2="70" y2="80" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>
</svg>
